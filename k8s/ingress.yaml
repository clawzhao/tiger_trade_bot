---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tiger-trade-bot
  annotations:
    # Annotations depend on your ingress controller (nginx, traefik, etc.)
    # Example for nginx:
    # kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Adjust these annotations to match your ingress controller and TLS setup
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: ${INGRESS_HOST:-tiger-bot.example.com}
    http:
      paths:
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: tiger-trade-bot
            port:
              number: 8080
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: tiger-trade-bot
            port:
              number: 9090
  # Uncomment to enable TLS
  # tls:
  # - hosts:
  #   - tiger-bot.example.com
  #   secretName: tiger-bot-tls-secret
