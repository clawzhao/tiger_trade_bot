---
apiVersion: v1
kind: Secret
metadata:
  name: tiger-trade-bot-secret
type: Opaque
stringData:
  tiger-id: "YOUR_TIGER_ID_HERE"
  account-id: "YOUR_ACCOUNT_ID_HERE"
  rsa-private-key: |
    -----BEGIN RSA PRIVATE KEY-----
    YOUR_PRIVATE_KEY_CONTENT_HERE
    -----END RSA PRIVATE KEY-----
#
# IMPORTANT: Before deploying, replace the placeholders with actual values.
# Create secret via:
#   kubectl create secret generic tiger-trade-bot-secret \
#     --from-literal=tiger-id='YOUR_TIGER_ID' \
#     --from-literal=account-id='YOUR_ACCOUNT_ID' \
#     --from-file=rsa-private-key=./path/to/rsa_private_key.pem
#
# Or edit this file and apply directly (be cautious with kubectl apply -f).
#
